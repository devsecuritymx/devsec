<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DevSecurityMX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #070a0e;
    --bg1:      #0c1117;
    --bg2:      #111820;
    --border:   #1e2d3d;
    --accent:   #00e5ff;
    --red:      #ff2d55;
    --yellow:   #ffc400;
    --green:    #00e676;
    --dim:      #3a5068;
    --text:     #c8d8e8;
    --text2:    #607080;
    --font-mono: 'Share Tech Mono', monospace;
    --font-ui:   'Rajdhani', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100vh;
    display: grid;
    grid-template-columns: 260px 1fr;
    overflow: hidden;
  }

  /* ── Scanlines overlay ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* ── SIDEBAR ── */
  aside {
    background: var(--bg1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 18px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 17px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo span { color: var(--red); }

  .sidebar-sub {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 3px;
  }

  .scan-list { flex: 1; overflow-y: auto; padding: 8px 0; }

  .scan-list::-webkit-scrollbar { width: 3px; }
  .scan-list::-webkit-scrollbar-thumb { background: var(--dim); }

  .scan-item {
    padding: 9px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    font-size: 12px;
    color: var(--text2);
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scan-item::before {
    content: '▸';
    color: var(--dim);
    font-size: 10px;
    transition: color .15s;
  }

  .scan-item:hover {
    background: var(--bg2);
    color: var(--text);
    border-left-color: var(--accent);
  }

  .scan-item:hover::before { color: var(--accent); }
  .scan-item.active {
    background: rgba(0,229,255,.05);
    color: var(--accent);
    border-left-color: var(--accent);
  }

  .no-scans {
    padding: 20px 16px;
    font-size: 11px;
    color: var(--dim);
  }

  /* ── MAIN ── */
  main {
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  header {
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-title {
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--text2);
    text-transform: uppercase;
  }

  .status-pills { display: flex; gap: 12px; align-items: center; }

  .pill {
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 2px;
    text-transform: uppercase;
    font-family: var(--font-ui);
    font-weight: 600;
  }

  .pill-green { background: rgba(0,230,118,.1); color: var(--green); border: 1px solid rgba(0,230,118,.2); }
  .pill-red   { background: rgba(255,45,85,.1);  color: var(--red);   border: 1px solid rgba(255,45,85,.2); }
  .pill-yellow{ background: rgba(255,196,0,.1);  color: var(--yellow);border: 1px solid rgba(255,196,0,.2); }
  .pill-dim   { background: rgba(60,80,100,.15); color: var(--dim);   border: 1px solid var(--border); }

  /* ── GRID CONTENT ── */
  .content {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto auto 1fr;
    gap: 1px;
    background: var(--border);
    overflow: auto;
  }

  /* ── CARDS ── */
  .card {
    background: var(--bg);
    padding: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-wide  { grid-column: span 2; }
  .card-full  { grid-column: span 3; }

  .card-title {
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-title::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CHART ── */
  .chart-wrap {
    position: relative;
    width: 150px; height: 150px;
    margin: auto;
  }

  .chart-label {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .score-num {
    font-size: 32px;
    font-family: var(--font-ui);
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .score-lbl {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── RISK BADGE ── */
  .risk-badge {
    text-align: center;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 3px;
    padding: 6px;
    border-radius: 2px;
  }

  /* ── SUMMARY FIELDS ── */
  .field-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
  }

  .field-key { color: var(--text2); }
  .field-val { color: var(--text); font-weight: bold; }

  /* ── FINDINGS ── */
  #findings { list-style: none; display: flex; flex-direction: column; gap: 6px; }

  .finding-item {
    font-size: 12px;
    padding: 7px 10px;
    background: var(--bg1);
    border-left: 3px solid var(--yellow);
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .finding-item::before {
    content: '⚠';
    font-size: 11px;
    color: var(--yellow);
  }

  /* ── STRINGS / PRE ── */
  pre {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.6;
    overflow: auto;
    max-height: 180px;
    flex: 1;
  }

  pre::-webkit-scrollbar { width: 3px; height: 3px; }
  pre::-webkit-scrollbar-thumb { background: var(--dim); }

  /* ── PARTITIONS ── */
  .part-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .part-table th {
    text-align: left;
    color: var(--dim);
    font-family: var(--font-ui);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-size: 10px;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  .part-table td {
    padding: 5px 8px;
    border-bottom: 1px solid rgba(30,45,61,.5);
    color: var(--text);
  }
  .part-table tr:hover td { background: var(--bg2); }

  /* ── SEARCH ── */
  .search-row { display: flex; gap: 6px; }

  input[type="text"] {
    flex: 1;
    background: var(--bg1);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    outline: none;
    transition: border .15s;
  }

  input[type="text"]:focus { border-color: var(--accent); }

  button {
    background: rgba(0,229,255,.08);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,.2);
    padding: 7px 16px;
    font-family: var(--font-ui);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .15s;
  }

  button:hover {
    background: rgba(0,229,255,.15);
    border-color: var(--accent);
  }

  /* ── EMPTY STATE ── */
  .empty {
    color: var(--dim);
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card { animation: fadeIn .3s ease both; }
  .card:nth-child(1) { animation-delay: .00s; }
  .card:nth-child(2) { animation-delay: .04s; }
  .card:nth-child(3) { animation-delay: .08s; }
  .card:nth-child(4) { animation-delay: .12s; }
  .card:nth-child(5) { animation-delay: .16s; }
  .card:nth-child(6) { animation-delay: .20s; }
</style>
</head>
<body>

<aside>
  <div class="sidebar-header">
    <div class="logo">DevSec<span>MX</span></div>
    <div class="sidebar-sub">MCU Audit Framework</div>
  </div>
  <div class="scan-list" id="scan-list">
    <div class="no-scans">Sin scans</div>
  </div>
</aside>

<main>
  <header>
    <span class="topbar-title">Firmware Analysis Dashboard</span>
    <div class="status-pills">
      <span class="pill pill-dim" id="chip-pill">CHIP: —</span>
      <span class="pill pill-dim" id="risk-pill">RISK: —</span>
      <span class="pill pill-green">● ONLINE</span>
    </div>
  </header>

  <div class="content" id="content">

    <!-- Resumen -->
    <div class="card">
      <div class="card-title">Resumen</div>
      <div id="summary-fields">
        <div class="empty">Selecciona un scan</div>
      </div>
    </div>

    <!-- Riesgo -->
    <div class="card">
      <div class="card-title">Score de Riesgo</div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
        <div class="chart-label">
          <div class="score-num" id="score-num">—</div>
          <div class="score-lbl">SCORE</div>
        </div>
      </div>
      <div class="risk-badge pill-dim" id="risk-badge">RIESGO: —</div>
    </div>

    <!-- Findings -->
    <div class="card">
      <div class="card-title">Findings</div>
      <ul id="findings"><li class="empty">—</li></ul>
    </div>

    <!-- Particiones -->
    <div class="card card-wide">
      <div class="card-title">Tabla de Particiones</div>
      <div id="parts-wrap"><div class="empty">—</div></div>
    </div>

    <!-- Búsqueda -->
    <div class="card">
      <div class="card-title">Búsqueda en Strings</div>
      <div class="search-row">
        <input type="text" id="query" placeholder="keyword...">
        <button onclick="search()">Buscar</button>
      </div>
      <pre id="search-out">—</pre>
    </div>

    <!-- Strings -->
    <div class="card card-wide">
      <div class="card-title">Strings Extraídas</div>
      <pre id="strings-out">—</pre>
    </div>

  </div>
</main>

<script>
let current = null;
let chartInst = null;

const RISK_COLORS = {
  CRITICO: { bg: 'rgba(255,45,85,.1)',   fg: '#ff2d55',  pill: 'pill-red'    },
  ALTO:    { bg: 'rgba(255,196,0,.1)',   fg: '#ffc400',  pill: 'pill-yellow' },
  MEDIO:   { bg: 'rgba(255,196,0,.07)', fg: '#ffc400',  pill: 'pill-yellow' },
  BAJO:    { bg: 'rgba(0,230,118,.1)',  fg: '#00e676',  pill: 'pill-green'  },
};

async function loadScans() {
  const r = await fetch('/scans').catch(() => null);
  if (!r) return;
  const list = await r.json();
  const el = document.getElementById('scan-list');
  el.innerHTML = '';
  if (!list.length) { el.innerHTML = '<div class="no-scans">Sin scans disponibles</div>'; return; }
  list.forEach(s => {
    const d = document.createElement('div');
    d.className = 'scan-item';
    d.textContent = s;
    d.onclick = () => {
      document.querySelectorAll('.scan-item').forEach(x => x.classList.remove('active'));
      d.classList.add('active');
      loadScan(s);
    };
    el.appendChild(d);
  });
}

async function loadScan(id) {
  current = id;
  const r = await fetch('/scan/' + id);
  const data = await r.json();
  const rep = data.report || {};

  // Pills header
  document.getElementById('chip-pill').textContent = 'CHIP: ' + (rep.chip || '—');
  const rc = RISK_COLORS[rep.risk] || RISK_COLORS['BAJO'];
  const rp = document.getElementById('risk-pill');
  rp.textContent = 'RISK: ' + (rep.risk || '—');
  rp.className = 'pill ' + rc.pill;

  // Summary fields
  const sf = document.getElementById('summary-fields');
  const fields = [
    ['Chip',   rep.chip  || '—'],
    ['Score',  rep.score != null ? rep.score : '—'],
    ['Riesgo', rep.risk  || '—'],
  ];
  sf.innerHTML = fields.map(([k,v]) =>
    `<div class="field-row"><span class="field-key">${k}</span><span class="field-val">${v}</span></div>`
  ).join('');

  // Score + chart
  const score = rep.score || 0;
  document.getElementById('score-num').textContent = score;
  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart'), {
    type: 'doughnut',
    data: {
      datasets: [{ data: [score, 100 - score], backgroundColor: [rc.fg, '#1e2d3d'], borderWidth: 0 }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: '72%', plugins: { legend: { display: false }, tooltip: { enabled: false } } }
  });

  // Risk badge
  const rb = document.getElementById('risk-badge');
  rb.textContent = rep.risk || '—';
  rb.style.background = rc.bg;
  rb.style.color = rc.fg;
  rb.style.border = `1px solid ${rc.fg}44`;

  // Findings
  const fi = document.getElementById('findings');
  fi.innerHTML = data.findings?.length
    ? data.findings.map(x => `<li class="finding-item">${x}</li>`).join('')
    : '<li class="empty">Sin findings</li>';

  // Partitions
  const pw = document.getElementById('parts-wrap');
  if (data.partitions?.length) {
    pw.innerHTML = `<table class="part-table">
      <thead><tr><th>Nombre</th><th>Offset</th><th>Size</th></tr></thead>
      <tbody>${data.partitions.map(p =>
        `<tr><td>${p.name}</td><td>0x${p.offset}</td><td>0x${p.size}</td></tr>`
      ).join('')}</tbody>
    </table>`;
  } else {
    pw.innerHTML = '<div class="empty">Sin particiones detectadas</div>';
  }

  // Strings
  document.getElementById('strings-out').textContent = data.strings || '—';
}

async function search() {
  if (!current) return;
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  const r = await fetch(`/search/${current}?q=${encodeURIComponent(q)}`);
  const data = await r.json();
  document.getElementById('search-out').textContent = data.length ? data.join('\n') : 'Sin resultados';
}

document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
loadScans();
</script>
</body>
</html>
